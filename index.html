<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMR Report Extractor</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <h1>CMR Report Extractor</h1>
    
    <h2>Upload Files</h2>
    <form id="uploadForm">
        <select id="extractionType">
            <option value="SAX_function">SAX Function</option>
            <option value="LAX_function">LAX Function</option>
            <option value="atrial_volume">Atrial Volume</option>
            <option value="mapping">Mapping</option>
            <option value="t1_aha_segmentation">T1 AHA Segmentation</option>
            <option value="t2_aha_segmentation">T2 AHA Segmentation</option>
        </select>
        <input type="file" id="fileInput" multiple>
        <button type="submit">Upload and Extract</button>
    </form>

    <div id="result"></div>

    <script>
        $(document).ready(function() {
            $('#uploadForm').on('submit', function(e) {
                e.preventDefault();
                var formData = new FormData();
                var files = $('#fileInput')[0].files;
                for (var i = 0; i < files.length; i++) {
                    formData.append('file', files[i]);
                }
                var extractionType = $('#extractionType').val();
                
                $.ajax({
                    url: '/api/upload/' + extractionType,
                    type: 'POST',
                    data: formData,
                    processData: false,
                    contentType: false,
                    success: function(data) {
                        var blob = new Blob([data], {type: 'text/csv'});
                        var link = document.createElement('a');
                        link.href = window.URL.createObjectURL(blob);
                        link.download = 'extracted_' + extractionType + '_values.csv';
                        link.click();
                    },
                    error: function(xhr, status, error) {
                        $('#result').text('Error: ' + xhr.responseText);
                    }
                });
            });
        });
    </script>
</body>
</html>
